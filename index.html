<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>全员影像汇总</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:微软雅黑}
body{padding:20px;background:#f5f6f8}
h2{margin-bottom:20px}
.bar{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px}
button{padding:8px 14px;border:none;background:#2980b9;color:#fff;border-radius:4px;cursor:pointer}
input{padding:8px;border:1px solid #ddd;border-radius:4px;width:200px}
.card-list{display:flex;flex-wrap:wrap;gap:15px}
.card{background:#fff;padding:12px;border-radius:8px;width:240px}
.card img{max-width:100%;max-height:140px;object-fit:cover;border-radius:4px}
.card p{font-size:13px;margin:4px 0}
</style>
</head>
<body>
<h2>全员施工影像汇总</h2>
<div class="bar">
<button onclick="loadAll()">刷新</button>
<button onclick="exportAll()">导出台账</button>
<input placeholder="搜索用户" id="key">
<button onclick="searchUser()">筛选</button>
</div>
<div class="card-list" id="list"></div>

<script>
let allData=[];
function loadAll(){allData=JSON.parse(localStorage.getItem("all_user_images")||"[]");render(allData)}
function render(arr){
let d=document.getElementById("list");d.innerHTML="";
arr.forEach(i=>{
let t={before:"施工前",doing:"施工中",after:"施工后"}[i.imgType];
let c=document.createElement("div");c.className="card";
c.innerHTML=`<p>用户：${i.username}</p><p>区域：${i.area}</p><p>阶段：${t}</p><p>${i.uploadTime.substr(0,10)}</p><img src="${i.imgUrl}"><p><a href="${i.imgUrl}" target="_blank">查看原图</a></p>`;
d.appendChild(c);
})
}
function searchUser(){let k=document.getElementById("key").value.trim();render(allData.filter(x=>x.username.includes(k)))}
function exportAll(){
if(allData.length===0)return;
let tsv="用户名\t区域\t阶段\t链接\t时间\n";
allData.forEach(d=>{tsv+=`${d.username}\t${d.area}\t${{before:"施工前",doing:"施工中",after:"施工后"}[d.imgType]}\t${d.imgUrl}\t${d.uploadTime}\n`});
let a=document.createElement("a");a.href=URL.createObjectURL(new Blob([tsv]));a.download="全员影像台账.txt";a.click();
}
window.onload=loadAll;
</script>
</body>
</html>
