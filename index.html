<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0,maximum-scale=1.0">
    <title>项目施工前中后影像归档表</title>
    <!-- 引入SheetJS Excel导出库 -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:微软雅黑}
        body{background:#fff;padding:20px}
        .header{text-align:center;margin-bottom:20px}
        h1{color:#333;font-size:22px}

        /* 项目信息配置区 */
        .project-info{background:#f8f9fa;padding:15px;border-radius:6px;margin-bottom:20px;border:1px solid #eee}
        .info-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-bottom:10px}
        .info-item label{font-size:13px;color:#666;display:block;margin-bottom:4px}
        .info-item input{width:100%;padding:6px;border:1px #ddd solid;border-radius:4px}
        .save-info-btn{padding:6px 15px;background:#2980b9;color:#fff;border:none;border-radius:4px;cursor:pointer}

        /* 区域管理区 */
        .area-manage{margin-bottom:20px;display:flex;gap:10px;align-items:center}
        .area-manage label{font-size:14px}
        .area-manage select{padding:6px;border:1px #ddd solid;border-radius:4px}
        .area-manage button{padding:6px 15px;background:#27ae60;color:#fff;border:none;border-radius:4px;cursor:pointer}
        .add-area-btn{background:#e67e22 !important}

        /* 核心表格样式 - 完全匹配您的截图 */
        .main-table{width:100%;border-collapse:collapse;margin-bottom:20px}
        .main-table th,.main-table td{border:1px solid #333;padding:10px;text-align:center;vertical-align:middle}
        .main-table th{background:#f8f9fa;font-weight:bold;font-size:14px}
        .main-table td{font-size:14px}
        /* 区域列合并样式 */
        .area-cell{font-weight:bold;color:#333}
        /* 上传单元格样式 */
        .upload-cell{min-width:180px;height:120px}
        .upload-btn{padding:6px 12px;background:#fff;border:1px dashed #999;border-radius:4px;cursor:pointer;color:#666;margin-bottom:8px}
        .upload-btn:hover{border-color:#2980b9;color:#2980b9}
        .img-preview{max-width:100%;max-height:80px;object-fit:cover;border-radius:4px}
        .file-input{display:none}
        /* 添加位置行 */
        .add-row-btn{width:100%;padding:10px;background:#f8f9fa;border:1px dashed #999;border-radius:4px;cursor:pointer;font-size:14px}
        .add-row-btn:hover{background:#f0f0f0}

        /* 导出功能区 */
        .export-area{margin-bottom:20px;text-align:center}
        .export-btn{padding:8px 18px;background:#e67e22;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:14px;margin:0 5px}

        /* 弹窗样式 */
        .modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:999}
        .modal-content{background:#fff;padding:20px;border-radius:8px;width:85%;max-width:400px}
        .modal input{width:100%;padding:8px;border:1px #ddd solid;border-radius:4px;margin:10px 0}
        .modal-btn{margin-top:10px;display:flex;gap:10px;justify-content:flex-end}
        .modal-btn button{padding:6px 15px;border-radius:4px;border:none;cursor:pointer}
        .confirm{background:#27ae60;color:#fff}
        .cancel{background:#999;color:#fff}
    </style>
</head>
<body>
    <div class="header">
        <h1>项目施工前中后影像归档表</h1>
    </div>

    <!-- 项目基础信息配置 -->
    <div class="project-info">
        <h3>项目基础信息（导出Excel自动填充）</h3>
        <div class="info-row">
            <div class="info-item">
                <label>项目名称</label>
                <input type="text" id="projectName" placeholder="请输入项目全称">
            </div>
            <div class="info-item">
                <label>施工单位</label>
                <input type="text" id="buildCompany" placeholder="请输入施工单位">
            </div>
            <div class="info-item">
                <label>建设单位</label>
                <input type="text" id="ownerCompany" placeholder="请输入建设单位">
            </div>
            <div class="info-item">
                <label>项目负责人</label>
                <input type="text" id="projectLeader" placeholder="请输入负责人姓名">
            </div>
        </div>
        <button class="save-info-btn" onclick="saveProjectInfo()">保存项目信息</button>
    </div>

    <!-- 区域管理 -->
    <div class="area-manage">
        <label>当前施工区域：</label>
        <select id="areaSelect" onchange="switchArea()"></select>
        <button class="add-area-btn" onclick="openAreaModal()">新增区域</button>
        <button onclick="addLocation()">添加位置</button>
    </div>

    <!-- 核心表格 - 完全匹配您的格式 -->
    <table class="main-table" id="mainTable">
        <thead>
            <tr>
                <th>区域</th>
                <th>位置</th>
                <th>施工前</th>
                <th>施工中</th>
                <th>施工后</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <!-- 表格行由JS动态生成 -->
        </tbody>
    </table>

    <!-- 导出功能区 -->
    <div class="export-area">
        <button class="export-btn" onclick="exportExcel('daily')">导出施工日报表</button>
        <button class="export-btn" onclick="exportExcel('weekly')">导出施工周报表</button>
        <button class="export-btn" onclick="exportExcel('monthly')">导出施工月报表</button>
        <button class="export-btn" onclick="exportExcel('all')">导出全量完整Excel</button>
    </div>

    <!-- 新增区域弹窗 -->
    <div class="modal" id="areaModal">
        <div class="modal-content">
            <h4>添加新施工区域</h4>
            <input type="text" id="areaName" placeholder="例如：六祖大道、1号厂房、办公楼">
            <div class="modal-btn">
                <button class="cancel" onclick="closeAreaModal()">取消</button>
                <button class="confirm" onclick="saveArea()">确定</button>
            </div>
        </div>
    </div>

<script>
    // 初始化全局数据
    let projectInfo = JSON.parse(localStorage.getItem('projectInfo')) || {
        projectName: '',
        buildCompany: '',
        ownerCompany: '',
        projectLeader: ''
    };
    let areaList = JSON.parse(localStorage.getItem('areaList')) || ['六祖大道'];
    let locationData = JSON.parse(localStorage.getItem('locationData')) || {};
    let nowArea = areaList[0];

    // 填充项目信息到输入框
    function fillProjectInfo(){
        document.getElementById('projectName').value = projectInfo.projectName;
        document.getElementById('buildCompany').value = projectInfo.buildCompany;
        document.getElementById('ownerCompany').value = projectInfo.ownerCompany;
        document.getElementById('projectLeader').value = projectInfo.projectLeader;
    }

    // 保存项目信息
    function saveProjectInfo(){
        projectInfo = {
            projectName: document.getElementById('projectName').value.trim(),
            buildCompany: document.getElementById('buildCompany').value.trim(),
            ownerCompany: document.getElementById('ownerCompany').value.trim(),
            projectLeader: document.getElementById('projectLeader').value.trim()
        };
        localStorage.setItem('projectInfo', JSON.stringify(projectInfo));
        alert('项目信息保存成功，导出Excel将自动填充');
    }

    // 渲染区域下拉列表
    function renderAreaSelect(){
        const select = document.getElementById('areaSelect');
        select.innerHTML = '';
        areaList.forEach(area=>{
            const option = document.createElement('option');
            option.value = area;
            option.textContent = area;
            if(area === nowArea) option.selected = true;
            select.appendChild(option);
        });
    }

    // 切换区域
    function switchArea(){
        nowArea = document.getElementById('areaSelect').value;
        renderTable();
    }

    // 新增区域弹窗操作
    function openAreaModal(){
        document.getElementById('areaModal').style.display = 'flex';
        document.getElementById('areaName').value = '';
    }
    function closeAreaModal(){
        document.getElementById('areaModal').style.display = 'none';
    }
    function saveArea(){
        let name = document.getElementById('areaName').value.trim();
        if(!name){
            alert('请输入区域名称');
            return;
        }
        if(!areaList.includes(name)){
            areaList.push(name);
            localStorage.setItem('areaList',JSON.stringify(areaList));
            // 初始化新区域的位置数据
            if(!locationData[name]) locationData[name] = [];
            localStorage.setItem('locationData',JSON.stringify(locationData));
        }
        nowArea = name;
        renderAreaSelect();
        closeAreaModal();
        renderTable();
    }

    // 添加位置
    function addLocation(){
        if(!locationData[nowArea]) locationData[nowArea] = [];
        const locationCount = locationData[nowArea].length + 1;
        locationData[nowArea].push({
            name: `位置${locationCount}`,
            before: '',
            beforeName: '',
            doing: '',
            doingName: '',
            after: '',
            afterName: '',
            time: new Date().toLocaleString(),
            date: new Date().toISOString().split('T')[0],
            week: getWeekNumber(new Date()),
            month: new Date().toISOString().slice(0,7)
        });
        localStorage.setItem('locationData',JSON.stringify(locationData));
        renderTable();
    }

    // 计算周数
    function getWeekNumber(d) {
        d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
        d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay()||7));
        const yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
        const weekNo = Math.ceil(( (d - yearStart) / 86400000 + 1)/7);
        return `${d.getUTCFullYear()}年第${weekNo}周`;
    }

    // 渲染核心表格
    function renderTable(){
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        const locations = locationData[nowArea] || [];
        const totalRows = locations.length;

        locations.forEach((loc, index)=>{
            const tr = document.createElement('tr');
            // 区域列 - 仅第一行显示，合并所有行
            if(index === 0){
                const areaTd = document.createElement('td');
                areaTd.className = 'area-cell';
                areaTd.textContent = nowArea;
                areaTd.rowSpan = totalRows;
                tr.appendChild(areaTd);
            }
            // 位置列
            const locTd = document.createElement('td');
            locTd.textContent = loc.name;
            tr.appendChild(locTd);
            // 施工前列
            const beforeTd = createUploadCell(nowArea, index, 'before', loc.before, loc.beforeName);
            tr.appendChild(beforeTd);
            // 施工中列
            const doingTd = createUploadCell(nowArea, index, 'doing', loc.doing, loc.doingName);
            tr.appendChild(doingTd);
            // 施工后列
            const afterTd = createUploadCell(nowArea, index, 'after', loc.after, loc.afterName);
            tr.appendChild(afterTd);

            tbody.appendChild(tr);
        });

        // 添加位置行
        const addTr = document.createElement('tr');
        const addTd = document.createElement('td');
        addTd.colSpan = 5;
        addTd.innerHTML = `<button class="add-row-btn" onclick="addLocation()">添加位置</button>`;
        addTr.appendChild(addTd);
        tbody.appendChild(addTr);
    }

    // 创建上传单元格
    function createUploadCell(area, index, type, imgUrl, imgName){
        const td = document.createElement('td');
        td.className = 'upload-cell';
        const inputId = `upload_${area}_${index}_${type}`;
        td.innerHTML = `
            <input type="file" class="file-input" id="${inputId}" accept="image/*" onchange="uploadImg('${area}', ${index}, '${type}', this)">
            <label for="${inputId}" class="upload-btn">上传图片</label>
            ${imgUrl ? `<img src="${imgUrl}" class="img-preview" alt="${imgName}">` : ''}
        `;
        return td;
    }

    // 上传图片处理
    function uploadImg(area, index, type, input){
        const file = input.files[0];
        if(!file) return;
        const imgUrl = URL.createObjectURL(file);
        // 更新数据
        if(!locationData[area]) locationData[area] = [];
        locationData[area][index][type] = imgUrl;
        locationData[area][index][`${type}Name`] = file.name;
        locationData[area][index].time = new Date().toLocaleString();
        locationData[area][index].date = new Date().toISOString().split('T')[0];
        locationData[area][index].week = getWeekNumber(new Date());
        locationData[area][index].month = new Date().toISOString().slice(0,7);
        localStorage.setItem('locationData',JSON.stringify(locationData));
        // 重新渲染表格
        renderTable();
    }

    // ------------------------------ Excel导出核心函数 ------------------------------
    function exportExcel(type) {
        // 扁平化所有数据
        const allData = [];
        Object.keys(locationData).forEach(area=>{
            locationData[area].forEach(loc=>{
                allData.push({
                    area: area,
                    location: loc.name,
                    beforeName: loc.beforeName,
                    doingName: loc.doingName,
                    afterName: loc.afterName,
                    time: loc.time,
                    date: loc.date,
                    week: loc.week,
                    month: loc.month
                });
            });
        });

        if(allData.length === 0){
            alert('暂无施工记录，无法导出Excel');
            return;
        }

        // 创建工作簿
        const wb = XLSX.utils.book_new();
        const projectName = projectInfo.projectName || '施工项目';

        // 1. 项目总览表
        if(type === 'all'){
            const overviewData = [
                ['项目基本信息总览'],
                ['项目名称', projectInfo.projectName],
                ['施工单位', projectInfo.buildCompany],
                ['建设单位', projectInfo.ownerCompany],
                ['项目负责人', projectInfo.projectLeader],
                ['统计时间', new Date().toLocaleString()],
                [''],
                ['进度汇总'],
                ['总施工区域数', areaList.length],
                ['总位置数', allData.length],
                ['施工前已上传', allData.filter(item=>item.beforeName).length],
                ['施工中已上传', allData.filter(item=>item.doingName).length],
                ['施工后已上传', allData.filter(item=>item.afterName).length],
            ];
            const overviewSheet = XLSX.utils.aoa_to_sheet(overviewData);
            overviewSheet['!merges'] = [{s:{r:0,c:0},e:{r:0,c:1}}];
            overviewSheet['!cols'] = [{wch:20}, {wch:40}];
            XLSX.utils.book_append_sheet(wb, overviewSheet, '项目总览');
        }

        // 2. 施工日报表
        if(type === 'all' || type === 'daily'){
            const dailyHeader = ['日期', '所属区域', '位置', '施工阶段', '照片名称', '记录时间', '记录人', '进度状态', '备注'];
            const dailyData = [dailyHeader];
            allData.forEach(item=>{
                if(item.beforeName) dailyData.push([item.date, item.area, item.location, '施工前', item.beforeName, item.time, projectInfo.projectLeader, '已完成', '原貌记录']);
                if(item.doingName) dailyData.push([item.date, item.area, item.location, '施工中', item.doingName, item.time, projectInfo.projectLeader, '进行中', '过程记录']);
                if(item.afterName) dailyData.push([item.date, item.area, item.location, '施工后', item.afterName, item.time, projectInfo.projectLeader, '已完工', '成品记录']);
            });
            const dailySheet = XLSX.utils.aoa_to_sheet(dailyData);
            dailySheet['!cols'] = [{wch:12}, {wch:15}, {wch:10}, {wch:10}, {wch:30}, {wch:20}, {wch:10}, {wch:10}, {wch:20}];
            XLSX.utils.book_append_sheet(wb, dailySheet, '施工日报表');
        }

        // 3. 施工周报表
        if(type === 'all' || type === 'weekly'){
            const weeklyHeader = ['周次', '所属周期', '所属区域', '位置', '本周完成内容', '本周进度', '存在问题', '下周计划', '负责人'];
            const weeklyData = [weeklyHeader];
            const weekGroup = {};
            allData.forEach(item=>{
                if(!weekGroup[item.week]) weekGroup[item.week] = {};
                if(!weekGroup[item.week][item.area]) weekGroup[item.week][item.area] = {};
                if(!weekGroup[item.week][item.area][item.location]) weekGroup[item.week][item.area][item.location] = [];
                weekGroup[item.week][item.area][item.location].push(item);
            });
            Object.keys(weekGroup).forEach(week=>{
                Object.keys(weekGroup[week]).forEach(area=>{
                    Object.keys(weekGroup[week][area]).forEach(location=>{
                        const items = weekGroup[week][area][location];
                        weeklyData.push([
                            week,
                            `${items[0].date} 至 ${items[items.length-1].date}`,
                            area,
                            location,
                            `完成施工前/中/后全流程影像记录，照片已归档`,
                            '100%',
                            '无',
                            '按计划推进后续位置施工',
                            projectInfo.projectLeader
                        ]);
                    });
                });
            });
            const weeklySheet = XLSX.utils.aoa_to_sheet(weeklyData);
            weeklySheet['!cols'] = [{wch:15}, {wch:25}, {wch:15}, {wch:10}, {wch:40}, {wch:10}, {wch:20}, {wch:20}, {wch:10}];
            XLSX.utils.book_append_sheet(wb, weeklySheet, '施工周报表');
        }

        // 4. 施工月报表
        if(type === 'all' || type === 'monthly'){
            const monthlyHeader = ['月份', '所属区域', '位置', '月度完成工程量', '月度进度', '累计完成', '存在问题', '整改情况', '下月计划', '负责人'];
            const monthlyData = [monthlyHeader];
            const monthGroup = {};
            allData.forEach(item=>{
                if(!monthGroup[item.month]) monthGroup[item.month] = {};
                if(!monthGroup[item.month][item.area]) monthGroup[item.month][item.area] = {};
                if(!monthGroup[item.month][item.area][item.location]) monthGroup[item.month][item.area][item.location] = [];
                monthGroup[item.month][item.area][item.location].push(item);
            });
            Object.keys(monthGroup).forEach(month=>{
                Object.keys(monthGroup[month]).forEach(area=>{
                    Object.keys(monthGroup[month][area]).forEach(location=>{
                        const items = monthGroup[month][area][location];
                        monthlyData.push([
                            month,
                            area,
                            location,
                            `完成施工前/中/后全流程影像记录，覆盖全施工阶段`,
                            '100%',
                            `1组全流程记录`,
                            '无',
                            '已全部完成整改',
                            '按计划推进后续位置施工任务',
                            projectInfo.projectLeader
                        ]);
                    });
                });
            });
            const monthlySheet = XLSX.utils.aoa_to_sheet(monthlyData);
            monthlySheet['!cols'] = [{wch:10}, {wch:15}, {wch:10}, {wch:40}, {wch:10}, {wch:12}, {wch:20}, {wch:20}, {wch:20}, {wch:10}];
            XLSX.utils.book_append_sheet(wb, monthlySheet, '施工月报表');
        }

        // 导出文件
        const fileName = `${projectName}_施工前中后_${type === 'all' ? '全量报表' : type === 'daily' ? '日报表' : type === 'weekly' ? '周报表' : '月报表'}_${new Date().toISOString().split('T')[0]}.xlsx`;
        XLSX.writeFile(wb, fileName);
        alert(`Excel文件导出成功：${fileName}`);
    }

    // 初始加载
    fillProjectInfo();
    renderAreaSelect();
    renderTable();
</script>
</body>
</html>
